<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Поспорим на Stars</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background-color: #0a0a0a;
            color: white;
        }
        button {
            background-color: #0088cc;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
        }
        input {
            padding: 12px;
            width: 80%;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
        }
        #status {
            margin-top: 20px;
            font-size: 16px;
            color: #aaa;
        }
        .hint {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🤙 Поспорим</h1>
    <p>Создай спор и делись ссылкой с другом</p>

    <input type="text" id="betTitle" placeholder="О чём спор? (Кто выиграет этот бой?)">
    <br>
    <input type="number" id="betAmount" placeholder="Количество Stars" value="10">
    <br>
    <button id="createBetBtn">Создать спор</button>
    <div id="status"></div>
    <div class="hint">Ссылка для друга появится после создания</div>

    <script>
        document.getElementById('createBetBtn').onclick = function() {
            const title = document.getElementById('betTitle').value;
            const amount = document.getElementById('betAmount').value;

            if (!title) {
                document.getElementById('status').innerHTML = '⚠️ Напиши, о чём спор!';
                return;
            }

            document.getElementById('status').innerHTML = '✅ Спор создан! Отправь другу ссылку: <br><b>t.me/starsporWin_bot?start=test</b>';
        };
    </script>

</body>
</html>
